# Egress proxy for the Claude Jail container.
# Only CONNECT (HTTPS) and HTTP requests to whitelisted domains are forwarded.
# Everything else is rejected.

User root
Group root
Port 8888
Listen 0.0.0.0
Timeout 60
MaxClients 50

# Domain allowlist — one regex per line in the filter file.
# Tinyproxy checks the Host header (HTTP) or CONNECT target (HTTPS).
Filter "/etc/tinyproxy/allowlist"
FilterURLs Off
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off

# Logging
LogLevel Info
LogFile "/var/log/tinyproxy.log"

# Allow connections from the jail network (any source — the internal Docker
# network means only the claude container can reach us anyway).
Allow 0.0.0.0/0

# Ports allowed for CONNECT (HTTPS tunnels)
ConnectPort 443

# No upstream proxy
