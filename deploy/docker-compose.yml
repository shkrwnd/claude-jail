services:
  # Config files are created from *.example templates by deploy/create-configs.sh
  # (start.sh runs it automatically; run it manually before a raw `docker compose up`).
  claude:
    build:
      context: ..
      dockerfile: deploy/Dockerfile

    env_file:
      # Later files win: user overrides beat committed defaults
      - container.defaults.env
      - container.env
      # Shared secret for the execution server (generated by create-configs.sh)
      - exec.token

    environment:
      # Ensure wrappers take precedence
      PATH: /opt/agent/bin:/usr/local/bin:/usr/bin:/bin
      # Execution server endpoint on the host (TCP — Docker Desktop cannot
      # reliably share Unix sockets between macOS host and container)
      EXEC_SERVER: host.docker.internal:8377

    extra_hosts:
      # Make host.docker.internal work on Linux too (no-op on Docker Desktop)
      - host.docker.internal:host-gateway

    stdin_open: true
    tty: true
    command: /bin/bash

    volumes:
      # Mount workspace only — NO credential files
      - ${WORKSPACE_DIR:-../workspace}:/workspace:rw
      # Persist Claude auth token and settings across rebuilds
      - claude:/home/agent/.claude
      # Egress allowlist
      - ./egress-config.json:/etc/agent/egress-config.json:ro

    working_dir: /workspace

    # Resources
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 256

    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - CHOWN              # tools need to chown files in workspace
      - NET_BIND_SERVICE   # tools that bind to ports
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-profile.json
    read_only: false
    tmpfs:
      - /tmp:nosuid,size=256m  # noexec omitted — gh/claude execute from /tmp

volumes:
  claude:
