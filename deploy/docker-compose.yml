networks:
  # Internal network: no direct internet access. The claude container lives
  # here and can only reach the sidecar (proxy, DNS, exec relay).
  jail:
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  # External network: has internet. The sidecar bridges jail to the outside.
  egress:

services:
  # ── Sidecar ──────────────────────────────────────────────────────────────
  # Single container providing three services to the jail network:
  #   - tinyproxy (8888): domain-filtered egress proxy
  #   - dnsmasq (53): DNS forwarder (internal network blocks external DNS)
  #   - socat (8377): TCP relay to host execution server
  # Edit deploy/sidecar/allowlist and restart to change allowed domains.
  sidecar:
    build:
      context: ./sidecar
    networks:
      jail:
        ipv4_address: 172.28.0.53
      egress:
    extra_hosts:
      - host.docker.internal:host-gateway
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ── Agent container ──────────────────────────────────────────────────────
  claude:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      sidecar:
        condition: service_started

    networks: [jail]
    dns: 172.28.0.53

    env_file:
      # Later files win: user overrides beat committed defaults
      - container.defaults.env
      - container.env
      # Shared secret for the execution server (generated by create-configs.sh)
      - exec.token

    environment:
      # Ensure wrappers take precedence
      PATH: /opt/agent/bin:/usr/local/bin:/usr/bin:/bin
      # Execution server endpoint (via sidecar relay)
      EXEC_SERVER: sidecar:8377
      # All HTTP(S) traffic goes through the egress proxy.
      # global-agent makes Node.js (Claude Code) respect these env vars.
      HTTPS_PROXY: http://sidecar:8888
      HTTP_PROXY: http://sidecar:8888
      NODE_OPTIONS: --require /opt/agent/proxy-bootstrap.js
      # Don't proxy traffic to internal services (exec relay is plain HTTP on jail network)
      NO_PROXY: sidecar

    stdin_open: true
    tty: true
    # Refresh the global Claude Code instructions on every start: the
    # persistent "claude" volume shadows /home/agent/.claude, so the image
    # copy at /opt/agent/CLAUDE.md is synced in before the shell starts.
    command: /bin/bash -c "mkdir -p /home/agent/.claude && cp /opt/agent/CLAUDE.md /home/agent/.claude/CLAUDE.md; exec /bin/bash"

    volumes:
      # Mount workspace only — NO credential files
      - ${WORKSPACE_DIR:-../workspace}:/workspace:rw
      # Persist Claude auth token and settings across rebuilds
      - claude:/home/agent/.claude

    working_dir: /workspace

    # Resources
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 256

    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - CHOWN              # tools need to chown files in workspace
      - NET_BIND_SERVICE   # tools that bind to ports
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-profile.json
    read_only: false
    tmpfs:
      - /tmp:nosuid,size=256m  # noexec omitted — gh/claude execute from /tmp

volumes:
  claude:
