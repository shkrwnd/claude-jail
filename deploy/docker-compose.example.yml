services:
  setup:
    image: alpine:3.19
    volumes:
      - .:/config               # deploy/ → /config
      - ..:/project-root        # repo root → /project-root (one level up from deploy/)
    command: sh -c "chmod +x /config/setup.sh && sh /config/setup.sh"

  claude:
    depends_on:
      setup:
        condition: service_completed_successfully
    # Your existing Claude Code image — do NOT change this.
    # The example below shows how to layer Outhora on top.
    build:
      context: ..
      dockerfile: deploy/Dockerfile.integration
      # context: .. means one level up from deploy/ = repo root

    environment:
      # Outhora configuration
      OUTHORA_API_URL: https://api.outhora.com
      OUTHORA_AGENT_ID: ${OUTHORA_AGENT_ID}
      OUTHORA_AGENT_SECRET: ${OUTHORA_AGENT_SECRET}
      OUTHORA_DEPT_ID: ${OUTHORA_DEPT_ID}
      OUTHORA_USER_ID: ${OUTHORA_USER_ID:-developer}
      OUTHORA_SESSION_ID: ${OUTHORA_SESSION_ID:-}

      # Claude Code
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      DISABLE_AUTOUPDATER: ${DISABLE_AUTOUPDATER:-1}

      # Ensure wrappers take precedence
      PATH: /opt/outhora/bin:/usr/local/bin:/usr/bin:/bin

    stdin_open: true
    tty: true
    command: /bin/bash

    volumes:
      # Mount workspace only — NO credential files
      # Set WORKSPACE_DIR in your .env or shell to point to any folder on the host
      - ${WORKSPACE_DIR:-../workspace}:/workspace:rw
      # Persist Claude auth token and settings across rebuilds — nothing else
      - claude:/home/outhora/.claude
      # Egress allowlist — copy egress-config.example.json → egress-config.json and edit
      - ./egress-config.json:/etc/outhora/egress-config.json:ro

    working_dir: /workspace

    # Resources
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 256

    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE        # allows tools to write config files as non-root
      - SETUID
      - SETGID
      - CHOWN
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-profile.json
    read_only: false
    tmpfs:
      - /tmp:nosuid,size=256m              # removed noexec — gh/claude need to execute from /tmp

    # Network: allow outbound to Outhora and required services only
    networks:
      - outhora-net

networks:
  outhora-net:
    driver: bridge

volumes:
  claude:
