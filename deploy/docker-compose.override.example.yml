# Workspace folders for Claude Code
# ─────────────────────────────────────────────────────────────────────────────
# Add the folders you want Claude Code to access as volumes below.
# (This file is auto-created from the template by start.sh / create-configs.sh
# and is never committed — your local paths stay on your machine.)
#
# Inside the container each folder appears under /workspace/<name>.
# Use :ro (read-only) for folders Claude should read but not modify.
#
# The execution server reads this file too, so mounts declared here are
# automatically mapped back to host paths — this is the only file to edit.
# After editing, restart with ./start.sh
#
# Example:
#
#   services:
#     claude:
#       volumes:
#         - /path/to/your/project:/workspace/project:rw
#         - /path/to/another/repo:/workspace/another-repo:rw
#         - /path/to/docs:/workspace/docs:ro
# ─────────────────────────────────────────────────────────────────────────────

services:
  claude: {}   # add a volumes: list here — see the example above
